name: P0-04 Regulatory Bundle Gate

run-name: >-
  P0-04 regulatory bundle / ${{ inputs.window_id }} / ${{ inputs.environment_name }}

on:
  workflow_dispatch:
    inputs:
      window_id:
        description: "Window identifier, por exemplo stg-2026-07-18-reg"
        required: true
        type: string
      environment_name:
        description: "GitHub Environment com approvals e STAGING_WINDOW_PRIVATE_ENV"
        required: true
        default: "staging-serious"
        type: string
      checks_dir:
        description: "Diretorio para os artefatos JSON do bundle"
        required: true
        default: "artifacts/staging/checks"
        type: string
      dossiers_dir:
        description: "Diretorio para os resumos markdown do bundle"
        required: true
        default: "artifacts/staging/dossiers"
        type: string
      internal_base_url:
        description: "Base URL interna do compliance-api"
        required: true
        default: "http://localhost:8002"
        type: string
      public_base_url:
        description: "Base URL publica do frontend/API facade"
        required: true
        default: "http://localhost:8080"
        type: string

permissions:
  contents: read

concurrency:
  group: p0-04-regulatory-bundle-${{ inputs.environment_name }}
  cancel-in-progress: false

jobs:
  regulatory-bundle-gate:
    name: Executar gate hospedado P0-04
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment: ${{ inputs.environment_name }}
    defaults:
      run:
        shell: bash
        working-directory: ontrackchain
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate workflow hygiene
        run: make check-workflow-hygiene

      - name: Prepare CI artifacts directory
        run: mkdir -p ci-artifacts

      - name: Validate required serious window secret
        env:
          STAGING_WINDOW_PRIVATE_ENV: ${{ secrets.STAGING_WINDOW_PRIVATE_ENV }}
        run: |
          if [ -z "${STAGING_WINDOW_PRIVATE_ENV}" ]; then
            echo "Missing required environment secret STAGING_WINDOW_PRIVATE_ENV for '${{ inputs.environment_name }}'." >&2
            exit 1
          fi

      - name: Materialize .env.staging.private
        env:
          STAGING_WINDOW_PRIVATE_ENV: ${{ secrets.STAGING_WINDOW_PRIVATE_ENV }}
        run: |
          umask 077
          printf '%s\n' "${STAGING_WINDOW_PRIVATE_ENV}" > .env.staging.private

      - name: Prepare request correlation
        run: |
          echo "P0_04_RUN_URL=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> "${GITHUB_ENV}"
          echo "ONTRACKCHAIN_REGULATORY_COMPLIANCE_REQUEST_ID=reg-bundle-compliance-gh-${{ github.run_id }}-${{ github.run_attempt }}" >> "${GITHUB_ENV}"
          echo "ONTRACKCHAIN_REGULATORY_EU_REQUEST_ID=reg-bundle-eu-gh-${{ github.run_id }}-${{ github.run_attempt }}" >> "${GITHUB_ENV}"

      - name: Reset stale compliance stack
        if: always()
        run: docker compose --env-file .env.staging.private down --remove-orphans || true

      - name: Run hosted P0-04 gate
        env:
          OUTPUT_DIR: ci-artifacts/p0-04
        run: |
          set -o pipefail
          make gate-p0-04-regulatory-bundle \
            WINDOW_ID="${{ inputs.window_id }}" \
            PRIVATE_ENV_FILE=.env.staging.private \
            CHECKS_DIR="${{ inputs.checks_dir }}" \
            DOSSIERS_DIR="${{ inputs.dossiers_dir }}" \
            COMPLIANCE_INTERNAL_BASE_URL="${{ inputs.internal_base_url }}" \
            COMPLIANCE_PUBLIC_BASE_URL="${{ inputs.public_base_url }}" \
            2>&1 | tee ci-artifacts/p0-04-regulatory-bundle-gate.log

      - name: Collect Docker diagnostics
        if: always()
        run: |
          docker compose --env-file .env.staging.private ps > ci-artifacts/p0-04-docker-compose-ps.txt || true
          docker compose --env-file .env.staging.private logs --tail=300 compliance-worker compliance-api postgres > ci-artifacts/p0-04-docker-compose-logs.txt || true

      - name: Publish workflow summary
        if: always()
        run: |
          {
            echo "## P0-04 Bundle regulatorio oficial"
            echo
            echo "- Window ID: \`${{ inputs.window_id }}\`"
            echo "- Environment: \`${{ inputs.environment_name }}\`"
            echo "- Checks dir: \`${{ inputs.checks_dir }}\`"
            echo "- Dossiers dir: \`${{ inputs.dossiers_dir }}\`"
            echo "- Compliance request ID: \`${ONTRACKCHAIN_REGULATORY_COMPLIANCE_REQUEST_ID}\`"
            echo "- EU request ID: \`${ONTRACKCHAIN_REGULATORY_EU_REQUEST_ID}\`"
            echo "- Run URL: \`${P0_04_RUN_URL}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Tear down compliance stack
        if: always()
        run: docker compose --env-file .env.staging.private down --remove-orphans || true

      - name: Remove ephemeral private env file
        if: always()
        run: rm -f .env.staging.private

      - name: Upload P0-04 diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: p0-04-regulatory-bundle-${{ inputs.window_id }}
          path: |
            ontrackchain/ci-artifacts
            ontrackchain/${{ inputs.checks_dir }}
            ontrackchain/${{ inputs.dossiers_dir }}
          if-no-files-found: warn
          retention-days: 30
