version: "1"

previews:
  generation: off

services:
  - type: web
    runtime: docker
    name: ontrackchain-frontend-staging
    plan: starter
    dockerContext: ./ontrackchain/apps/frontend
    dockerfilePath: ./ontrackchain/apps/frontend/Dockerfile
    healthCheckPath: /login
    envVars:
      - key: APP_ENV
        value: test
      - key: AUTH_MODE
        value: dev
      - key: DEV_AUTH_ENABLED
        value: "true"
      - key: NEXT_PUBLIC_APP_ENV
        value: test
      - key: NEXT_PUBLIC_AUTH_MODE
        value: dev
      - key: NEXT_PUBLIC_DEV_AUTH_ENABLED
        value: "true"
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://ontrackchain-frontend-staging.onrender.com
      - key: INTERNAL_API_BASE_URL
        value: https://ontrackchain-frontend-staging.onrender.com
