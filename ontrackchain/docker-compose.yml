services:
  traefik:
    image: traefik:v3.1
    command:
      - --configFile=/etc/traefik/traefik.yml
    ports:
      - "${TRAEFIK_HTTP_PORT:-8080}:80"
      - "${TRAEFIK_DASHBOARD_PORT:-8081}:8080"
    volumes:
      - ./infra/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./infra/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    networks:
      - ontrackchain

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ontrackchain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ontrackchain}
      POSTGRES_DB: ${POSTGRES_DB:-ontrackchain}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    networks:
      - ontrackchain

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    networks:
      - ontrackchain

  auth-service:
    build:
      context: ./apps/auth-service
    environment:
      APP_ENV: ${APP_ENV:-local}
      AUTH_MODE: ${AUTH_MODE:-dev}
      DEV_AUTH_ENABLED: ${DEV_AUTH_ENABLED:-true}
      OIDC_PROVIDER: ${OIDC_PROVIDER:-keycloak}
      JWT_ISSUER: ${JWT_ISSUER:-ontrackchain}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-ontrackchain}
      JWT_HS256_SECRET: ${JWT_HS256_SECRET:-change-me}
      MFA_TOTP_SECRET: ${MFA_TOTP_SECRET:-JBSWY3DPEHPK3PXP}
      MFA_TOTP_ISSUER: ${MFA_TOTP_ISSUER:-OnTrackChain}
      MFA_TOTP_ACCOUNT_NAME: ${MFA_TOTP_ACCOUNT_NAME:-local-admin@ontrackchain}
      MFA_TOTP_PERIOD_SECONDS: ${MFA_TOTP_PERIOD_SECONDS:-30}
      MFA_TOTP_DIGITS: ${MFA_TOTP_DIGITS:-6}
      MFA_TOTP_WINDOW: ${MFA_TOTP_WINDOW:-1}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_AUDIENCE: ${OIDC_AUDIENCE:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_JWKS_URL: ${OIDC_JWKS_URL:-}
      OIDC_AUTHORIZATION_URL: ${OIDC_AUTHORIZATION_URL:-}
      OIDC_ORG_CLAIM: ${OIDC_ORG_CLAIM:-}
      OIDC_PLAN_CLAIM: ${OIDC_PLAN_CLAIM:-}
      OIDC_ROLE_CLAIM: ${OIDC_ROLE_CLAIM:-}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-ontrackchain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ontrackchain}
      POSTGRES_DB: ${POSTGRES_DB:-ontrackchain}
    depends_on:
      - postgres
    networks:
      - ontrackchain
    labels:
      - traefik.enable=true
      - traefik.http.routers.auth.rule=PathPrefix(`/auth`)
      - traefik.http.routers.auth.entrypoints=web
      - traefik.http.services.auth.loadbalancer.server.port=9000

  keycloak:
    image: quay.io/keycloak/keycloak:25.0.6
    command:
      - start-dev
      - --import-realm
      - --proxy-headers=xforwarded
      - --hostname=${KEYCLOAK_PUBLIC_URL:-http://auth.localhost:8080}
      - --hostname-strict=false
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: dev-file
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME: ${KEYCLOAK_PUBLIC_URL:-http://auth.localhost:8080}
      KEYCLOAK_IMPORT: /opt/keycloak/data/import/realm-ontrackchain.json
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./infra/keycloak/realm-ontrackchain.json:/opt/keycloak/data/import/realm-ontrackchain.json:ro
    profiles:
      - oidc
    ports:
      - "${KEYCLOAK_HTTP_PORT:-8088}:8080"
    networks:
      - ontrackchain
    labels:
      - traefik.enable=true
      - traefik.http.routers.keycloak.rule=Host(`${KEYCLOAK_HOSTNAME:-auth.localhost}`)
      - traefik.http.routers.keycloak.entrypoints=web
      - traefik.http.routers.keycloak.priority=250
      - traefik.http.services.keycloak.loadbalancer.server.port=8080

  public-api:
    build:
      context: ./apps/public-api
    environment:
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
    depends_on:
      - redis
    networks:
      - ontrackchain
    labels:
      - traefik.enable=true
      - traefik.http.routers.public.rule=PathPrefix(`/public`)
      - traefik.http.routers.public.entrypoints=web
      - traefik.http.routers.public.priority=100
      - traefik.http.routers.public.middlewares=public-ratelimit@docker
      - traefik.http.services.public.loadbalancer.server.port=8000
      - traefik.http.middlewares.public-ratelimit.ratelimit.average=10
      - traefik.http.middlewares.public-ratelimit.ratelimit.period=3600s

  investigation-api:
    build:
      context: .
      dockerfile: apps/investigation-api/Dockerfile
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-ontrackchain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ontrackchain}
      POSTGRES_DB: ${POSTGRES_DB:-ontrackchain}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      INVESTIGATION_INTERNAL_METRICS_ENABLED: ${INVESTIGATION_INTERNAL_METRICS_ENABLED:-true}
      INVESTIGATION_RPC_PROVIDER: ${INVESTIGATION_RPC_PROVIDER:-evm_rpc}
      INVESTIGATION_RPC_ENABLED: ${INVESTIGATION_RPC_ENABLED:-false}
      INVESTIGATION_RPC_PRIMARY_URL: ${INVESTIGATION_RPC_PRIMARY_URL:-}
      INVESTIGATION_RPC_FALLBACK_URL: ${INVESTIGATION_RPC_FALLBACK_URL:-}
      INVESTIGATION_RPC_TIMEOUT_MS: ${INVESTIGATION_RPC_TIMEOUT_MS:-1500}
      INVESTIGATION_RPC_MAX_RETRIES: ${INVESTIGATION_RPC_MAX_RETRIES:-1}
    depends_on:
      - postgres
      - redis
    networks:
      - ontrackchain
    labels:
      - traefik.enable=true
      - traefik.http.routers.investigation.rule=PathPrefix(`/api/v1/investigation`)
      - traefik.http.routers.investigation.entrypoints=web
      - traefik.http.routers.investigation.priority=100
      - traefik.http.routers.investigation.middlewares=auth@docker
      - traefik.http.services.investigation.loadbalancer.server.port=8001

  investigation-worker:
    build:
      context: .
      dockerfile: apps/investigation-api/Dockerfile
    command: ["python", "-m", "investigation_api.worker"]
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-ontrackchain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ontrackchain}
      POSTGRES_DB: ${POSTGRES_DB:-ontrackchain}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      INVESTIGATION_INTERNAL_BASE_URL: http://investigation-api:8001
      INVESTIGATION_WORKER_PROCESSING_SECONDS: ${INVESTIGATION_WORKER_PROCESSING_SECONDS:-2}
      INVESTIGATION_WORKER_LOCAL_CONCURRENCY: ${INVESTIGATION_WORKER_LOCAL_CONCURRENCY:-8}
      INVESTIGATION_WORKER_BASE_BACKOFF_SECONDS: ${INVESTIGATION_WORKER_BASE_BACKOFF_SECONDS:-5}
      INVESTIGATION_RPC_PROVIDER: ${INVESTIGATION_RPC_PROVIDER:-evm_rpc}
      INVESTIGATION_RPC_ENABLED: ${INVESTIGATION_RPC_ENABLED:-false}
      INVESTIGATION_RPC_PRIMARY_URL: ${INVESTIGATION_RPC_PRIMARY_URL:-}
      INVESTIGATION_RPC_FALLBACK_URL: ${INVESTIGATION_RPC_FALLBACK_URL:-}
      INVESTIGATION_RPC_TIMEOUT_MS: ${INVESTIGATION_RPC_TIMEOUT_MS:-1500}
      INVESTIGATION_RPC_MAX_RETRIES: ${INVESTIGATION_RPC_MAX_RETRIES:-1}
    depends_on:
      - postgres
      - redis
      - investigation-api
    networks:
      - ontrackchain

  compliance-api:
    build:
      context: .
      dockerfile: apps/compliance-api/Dockerfile
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-ontrackchain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ontrackchain}
      POSTGRES_DB: ${POSTGRES_DB:-ontrackchain}
      COMPLIANCE_INTERNAL_METRICS_ENABLED: ${COMPLIANCE_INTERNAL_METRICS_ENABLED:-true}
      COMPLIANCE_QUEUED_CASES_WARN_THRESHOLD: ${COMPLIANCE_QUEUED_CASES_WARN_THRESHOLD:-5}
      COMPLIANCE_FAILED_LAST_24H_CRITICAL_THRESHOLD: ${COMPLIANCE_FAILED_LAST_24H_CRITICAL_THRESHOLD:-1}
      COMPLIANCE_EXPIRED_QUOTES_WARN_THRESHOLD: ${COMPLIANCE_EXPIRED_QUOTES_WARN_THRESHOLD:-10}
      COMPLIANCE_COMPLETED_WITHOUT_REPORT_WARN_THRESHOLD: ${COMPLIANCE_COMPLETED_WITHOUT_REPORT_WARN_THRESHOLD:-3}
      COMPLIANCE_PROVIDER_DEGRADED_WARN_THRESHOLD: ${COMPLIANCE_PROVIDER_DEGRADED_WARN_THRESHOLD:-1}
      COMPLIANCE_RISK_PROVIDER: ${COMPLIANCE_RISK_PROVIDER:-trm_labs}
      COMPLIANCE_TRM_ENABLED: ${COMPLIANCE_TRM_ENABLED:-false}
      COMPLIANCE_TRM_SCREENING_URL: ${COMPLIANCE_TRM_SCREENING_URL:-}
      COMPLIANCE_TRM_API_KEY: ${COMPLIANCE_TRM_API_KEY:-}
      COMPLIANCE_TRM_API_KEY_HEADER: ${COMPLIANCE_TRM_API_KEY_HEADER:-Authorization}
      COMPLIANCE_TRM_API_KEY_PREFIX: ${COMPLIANCE_TRM_API_KEY_PREFIX:-Bearer }
      COMPLIANCE_TRM_TIMEOUT_MS: ${COMPLIANCE_TRM_TIMEOUT_MS:-1500}
      COMPLIANCE_TRM_MAX_RETRIES: ${COMPLIANCE_TRM_MAX_RETRIES:-1}
    depends_on:
      - postgres
    networks:
      - ontrackchain
    labels:
      - traefik.enable=true
      - traefik.http.routers.compliance.rule=PathPrefix(`/api/v1/compliance`)
      - traefik.http.routers.compliance.entrypoints=web
      - traefik.http.routers.compliance.priority=100
      - traefik.http.routers.compliance.middlewares=auth@docker
      - traefik.http.services.compliance.loadbalancer.server.port=8002

  compliance-worker:
    build:
      context: .
      dockerfile: apps/compliance-api/Dockerfile
    command: ["python", "-m", "compliance_api.worker"]
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-ontrackchain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ontrackchain}
      POSTGRES_DB: ${POSTGRES_DB:-ontrackchain}
      OPENSANCTIONS_API_KEY: ${OPENSANCTIONS_API_KEY:-}
      COMPLIANCE_OFAC_SDN_SOURCE_URL: ${COMPLIANCE_OFAC_SDN_SOURCE_URL:-}
      COMPLIANCE_EU_SANCTIONS_SOURCE_URL: ${COMPLIANCE_EU_SANCTIONS_SOURCE_URL:-}
      COMPLIANCE_WORKER_IDLE_WAIT_SECONDS: ${COMPLIANCE_WORKER_IDLE_WAIT_SECONDS:-60}
      COMPLIANCE_WORKER_OFAC_SYNC_SECONDS: ${COMPLIANCE_WORKER_OFAC_SYNC_SECONDS:-21600}
      COMPLIANCE_WORKER_UN_SYNC_SECONDS: ${COMPLIANCE_WORKER_UN_SYNC_SECONDS:-86400}
      COMPLIANCE_WORKER_EU_SYNC_SECONDS: ${COMPLIANCE_WORKER_EU_SYNC_SECONDS:-86400}
      COMPLIANCE_WORKER_OPENSANCTIONS_SYNC_SECONDS: ${COMPLIANCE_WORKER_OPENSANCTIONS_SYNC_SECONDS:-86400}
      COMPLIANCE_WORKER_ROS_DEADLINE_SCAN_SECONDS: ${COMPLIANCE_WORKER_ROS_DEADLINE_SCAN_SECONDS:-3600}
    depends_on:
      - postgres
      - compliance-api
    networks:
      - ontrackchain

  monitoring-api:
    build:
      context: .
      dockerfile: apps/monitoring-api/Dockerfile
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-ontrackchain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ontrackchain}
      POSTGRES_DB: ${POSTGRES_DB:-ontrackchain}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      MONITORING_INTERNAL_METRICS_ENABLED: ${MONITORING_INTERNAL_METRICS_ENABLED:-true}
      MONITORING_ALERTS_LAST_HOUR_WARN_THRESHOLD: ${MONITORING_ALERTS_LAST_HOUR_WARN_THRESHOLD:-5}
      MONITORING_CRITICAL_ALERTS_LAST_24H_CRITICAL_THRESHOLD: ${MONITORING_CRITICAL_ALERTS_LAST_24H_CRITICAL_THRESHOLD:-1}
      MONITORING_EXPIRED_QUOTES_WARN_THRESHOLD: ${MONITORING_EXPIRED_QUOTES_WARN_THRESHOLD:-10}
      MONITORING_OPEN_QUOTES_WARN_THRESHOLD: ${MONITORING_OPEN_QUOTES_WARN_THRESHOLD:-25}
      ALERTMANAGER_WEBHOOK_BEARER_TOKEN: ${ALERTMANAGER_WEBHOOK_BEARER_TOKEN:-alertmanager-local-token}
    depends_on:
      - postgres
      - redis
    networks:
      - ontrackchain
    labels:
      - traefik.enable=true
      - traefik.http.routers.monitoring.rule=PathPrefix(`/api/v1/monitoring`)
      - traefik.http.routers.monitoring.entrypoints=web
      - traefik.http.routers.monitoring.priority=100
      - traefik.http.routers.monitoring.middlewares=auth@docker
      - traefik.http.services.monitoring.loadbalancer.server.port=8003

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/observability/investigation.rules.yml:/etc/prometheus/rules/investigation.rules.yml:ro
      - ./infra/observability/monitoring.rules.yml:/etc/prometheus/rules/monitoring.rules.yml:ro
      - ./infra/observability/compliance.rules.yml:/etc/prometheus/rules/compliance.rules.yml:ro
      - ./infra/observability/report.rules.yml:/etc/prometheus/rules/report.rules.yml:ro
      - ./infra/observability/platform.rules.yml:/etc/prometheus/rules/platform.rules.yml:ro
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      - investigation-api
      - monitoring-api
      - compliance-api
      - report-api
      - alertmanager
    networks:
      - ontrackchain

  alertmanager:
    image: prom/alertmanager:v0.28.1
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    volumes:
      - ./infra/observability/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    depends_on:
      - monitoring-api
    networks:
      - ontrackchain

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: ${GRAFANA_ANONYMOUS_ENABLED:-false}
      GF_AUTH_DISABLE_LOGIN_FORM: ${GRAFANA_DISABLE_LOGIN_FORM:-false}
    volumes:
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    depends_on:
      - prometheus
    networks:
      - ontrackchain

  report-api:
    build:
      context: .
      dockerfile: apps/report-api/Dockerfile
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-ontrackchain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ontrackchain}
      POSTGRES_DB: ${POSTGRES_DB:-ontrackchain}
      REPORT_INTERNAL_METRICS_ENABLED: ${REPORT_INTERNAL_METRICS_ENABLED:-true}
      REPORT_DOWNLOADS_LAST_24H_WARN_THRESHOLD: ${REPORT_DOWNLOADS_LAST_24H_WARN_THRESHOLD:-10}
      REPORT_PENDING_ONCHAIN_WARN_THRESHOLD: ${REPORT_PENDING_ONCHAIN_WARN_THRESHOLD:-3}
      REPORT_LEGAL_DOWNLOAD_SECURITY_VIOLATION_THRESHOLD: ${REPORT_LEGAL_DOWNLOAD_SECURITY_VIOLATION_THRESHOLD:-1}
      REPORT_PERSISTED_WITHOUT_DOWNLOAD_WARN_THRESHOLD: ${REPORT_PERSISTED_WITHOUT_DOWNLOAD_WARN_THRESHOLD:-3}
    depends_on:
      - postgres
    networks:
      - ontrackchain
    labels:
      - traefik.enable=true
      - traefik.http.routers.reports.rule=PathPrefix(`/api/v1/reports`)
      - traefik.http.routers.reports.entrypoints=web
      - traefik.http.routers.reports.priority=100
      - traefik.http.routers.reports.middlewares=auth@docker
      - traefik.http.services.reports.loadbalancer.server.port=8004

  frontend:
    build:
      context: ./apps/frontend
      target: dev
    environment:
      APP_ENV: ${APP_ENV:-local}
      AUTH_MODE: ${AUTH_MODE:-dev}
      DEV_AUTH_ENABLED: ${DEV_AUTH_ENABLED:-true}
      NEXT_PUBLIC_APP_ENV: ${NEXT_PUBLIC_APP_ENV:-local}
      NEXT_PUBLIC_AUTH_MODE: ${NEXT_PUBLIC_AUTH_MODE:-dev}
      NEXT_PUBLIC_DEV_AUTH_ENABLED: ${NEXT_PUBLIC_DEV_AUTH_ENABLED:-true}
      INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://traefik}
      INTERNAL_AUTH_BASE_URL: ${INTERNAL_AUTH_BASE_URL:-http://auth-service:9000}
      INTERNAL_KEYCLOAK_BASE_URL: ${INTERNAL_KEYCLOAK_BASE_URL:-http://keycloak:8080}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:${TRAEFIK_HTTP_PORT:-8080}}
    networks:
      - ontrackchain
    labels:
      - traefik.enable=true
      - traefik.http.routers.frontend.rule=PathPrefix(`/`)
      - traefik.http.routers.frontend.entrypoints=web
      - traefik.http.routers.frontend.priority=1
      - traefik.http.services.frontend.loadbalancer.server.port=3000

networks:
  ontrackchain:
    name: ${COMPOSE_NETWORK_NAME:-ontrackchain}

volumes:
  postgres_data:
  keycloak_data:
