global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - ${ALERTMANAGER_HOSTPORT}

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: investigation-api
    metrics_path: /internal/metrics/prometheus
    static_configs:
      - targets:
          - ${INVESTIGATION_API_HOSTPORT}

  - job_name: monitoring-api
    metrics_path: /internal/metrics/prometheus
    static_configs:
      - targets:
          - ${MONITORING_API_HOSTPORT}

  - job_name: compliance-api
    metrics_path: /internal/metrics/prometheus
    static_configs:
      - targets:
          - ${COMPLIANCE_API_HOSTPORT}

  - job_name: report-api
    metrics_path: /internal/metrics/prometheus
    static_configs:
      - targets:
          - ${REPORT_API_HOSTPORT}
