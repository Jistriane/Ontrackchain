global:
  resolve_timeout: 5m

route:
  receiver: monitoring-webhook
  group_by:
    - alertname
    - service
    - severity
  group_wait: 5s
  group_interval: 30s
  repeat_interval: 4h

receivers:
  - name: monitoring-webhook
    webhook_configs:
      - url: http://${MONITORING_API_HOSTPORT}/internal/ops/alertmanager/webhook
        send_resolved: true
        http_config:
          authorization:
            type: Bearer
            credentials: ${ALERTMANAGER_WEBHOOK_BEARER_TOKEN}
