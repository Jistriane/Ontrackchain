global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: investigation-api
    metrics_path: /internal/metrics/prometheus
    static_configs:
      - targets:
          - investigation-api:8001

  - job_name: monitoring-api
    metrics_path: /internal/metrics/prometheus
    static_configs:
      - targets:
          - monitoring-api:8003

  - job_name: compliance-api
    metrics_path: /internal/metrics/prometheus
    static_configs:
      - targets:
          - compliance-api:8002

  - job_name: report-api
    metrics_path: /internal/metrics/prometheus
    static_configs:
      - targets:
          - report-api:8004
