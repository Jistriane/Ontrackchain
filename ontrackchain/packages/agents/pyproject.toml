[build-system]
requires = ["hatchling>=1.24.2"]
build-backend = "hatchling.build"

[project]
name = "ontrackchain-agents"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
  "pydantic>=2.7.4",
  "httpx>=0.27.0",
  "celery>=5.4.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/ontrackchain_agents"]
